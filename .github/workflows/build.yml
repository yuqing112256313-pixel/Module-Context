name: CMake CI

on:
  push:
  pull_request:

jobs:
  build-windows:
    name: Windows build and artifacts
    runs-on: windows-latest
    env:
      BUILD_DIR: ${{ github.workspace }}/build
      STAGE_DIR: ${{ github.workspace }}/stage
      STAGE_DEBUG_DIR: ${{ github.workspace }}/stage-debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -E make_directory "$env:BUILD_DIR"
          cmake -S . -B "$env:BUILD_DIR" -DCMAKE_DEBUG_POSTFIX=d

      - name: Build (Release)
        run: cmake --build "$env:BUILD_DIR" --config Release --parallel

      - name: Install Release to staging
        run: cmake --install "$env:BUILD_DIR" --config Release --prefix "$env:STAGE_DIR"

      - name: Build (Debug)
        run: cmake --build "$env:BUILD_DIR" --config Debug --parallel

      - name: Install Debug to staging
        run: cmake --install "$env:BUILD_DIR" --config Debug --prefix "$env:STAGE_DEBUG_DIR"

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/include/module_context/framework | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts/include/module_context/messaging | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts/lib | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts/bin | Out-Null

          Get-ChildItem -Path "$env:STAGE_DIR/include/module_context/framework" -Recurse -File -Filter *.h |
            Copy-Item -Destination "artifacts/include/module_context/framework" -Force

          Get-ChildItem -Path "$env:STAGE_DIR/include/module_context/messaging" -Recurse -File -Filter *.h |
            Copy-Item -Destination "artifacts/include/module_context/messaging" -Force

          Get-ChildItem -Path $env:STAGE_DIR -Recurse -File -Filter "mc_core_framework*.lib" |
            Copy-Item -Destination "artifacts/lib" -Force

          Get-ChildItem -Path $env:STAGE_DIR -Recurse -File -Filter "mc_core_framework*.dll" |
            Copy-Item -Destination "artifacts/bin" -Force

      - name: Upload Windows artifacts (.h/.lib/.dll)
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts
          if-no-files-found: error

      - name: Collect Windows debug artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts-debug/include/module_context/framework | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts-debug/include/module_context/messaging | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts-debug/lib | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts-debug/bin | Out-Null

          Get-ChildItem -Path "$env:STAGE_DEBUG_DIR/include/module_context/framework" -Recurse -File -Filter *.h |
            Copy-Item -Destination "artifacts-debug/include/module_context/framework" -Force

          Get-ChildItem -Path "$env:STAGE_DEBUG_DIR/include/module_context/messaging" -Recurse -File -Filter *.h |
            Copy-Item -Destination "artifacts-debug/include/module_context/messaging" -Force

          Get-ChildItem -Path $env:STAGE_DEBUG_DIR -Recurse -File -Filter "mc_core_framework*d.lib" |
            Copy-Item -Destination "artifacts-debug/lib" -Force

          Get-ChildItem -Path $env:STAGE_DEBUG_DIR -Recurse -File -Filter "mc_core_framework*d.dll" |
            Copy-Item -Destination "artifacts-debug/bin" -Force

      - name: Upload Windows debug artifacts (.h/.lib/.dll)
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts-debug
          path: artifacts-debug
          if-no-files-found: error
