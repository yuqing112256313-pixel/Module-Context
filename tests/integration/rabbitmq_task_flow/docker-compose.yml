services:
  rabbitmq:
    image: rabbitmq:3.13-management
    hostname: mc-rabbitmq-task-flow
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_ADMIN_USER:-mc_admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_ADMIN_PASS:-mc_admin_secret}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mc_rabbitmq_task_flow_data:/var/lib/rabbitmq

volumes:
  mc_rabbitmq_task_flow_data:
