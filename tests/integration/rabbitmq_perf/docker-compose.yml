services:
  rabbitmq:
    image: rabbitmq:3.13-management
    hostname: mc-rabbitmq-perf
    ports:
      - "127.0.0.1:5673:5672"
      - "127.0.0.1:15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_ADMIN_USER:-mc_perf_admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_ADMIN_PASS:-mc_perf_admin_secret}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mc_rabbitmq_perf_data:/var/lib/rabbitmq

volumes:
  mc_rabbitmq_perf_data:
